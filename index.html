<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Calculator</title>

    <link rel="stylesheet" href="home.css">
</head>
<body>

<div class="container">

    <h1>🧮 Multi Calculator</h1>

    <p>Select the calculator you want to use</p>

    <div class="cards">

        <div class="card">
            <div class="icon">🔬</div>

            <h2>Scientific Calculator</h2>

            <p>
                Perform scientific calculations including
                trigonometry, logarithms, powers,
                square roots and more.
            </p>

            <button onclick="openScientific()">
                Open Calculator
            </button>

        </div>


        <div class="card">

            <div class="icon">💰</div>

            <h2>Finance Calculator</h2>

            <p>
                Calculate EMI, Simple Interest,
                Compound Interest, GST,
                Percentage and Financial Planning.
            </p>

            <button onclick="openFinance()">
                Open Calculator
            </button>

        </div>

    </div>

</div>

<script src="home.js"></script>

</body>
</html>
